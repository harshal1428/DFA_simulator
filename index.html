<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFA Simulator & Animator</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #111827;
        }
        
        * {
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const DFASimulator = () => {
            // DFA Definition State
            const [numStates, setNumStates] = useState(3);
            const [alphabet, setAlphabet] = useState('0,1');
            const [transitions, setTransitions] = useState({});
            const [startState, setStartState] = useState('q0');
            const [acceptStates, setAcceptStates] = useState(['q2']);
            
            // Animation State
            const [inputString, setInputString] = useState('');
            const [isAnimating, setIsAnimating] = useState(false);
            const [currentStep, setCurrentStep] = useState(0);
            const [currentState, setCurrentState] = useState(null);
            const [animationSpeed, setAnimationSpeed] = useState(1000);
            const [isPaused, setIsPaused] = useState(false);
            const [result, setResult] = useState(null);
            const [pathTrace, setPathTrace] = useState([]);
            const [activeTransition, setActiveTransition] = useState(null);
            
            // Canvas State
            const [statePositions, setStatePositions] = useState({});
            const svgRef = useRef(null);
            const animationTimeoutRef = useRef(null);

            // Preloaded Examples
            const examples = {
                'Strings ending in 1': {
                    numStates: 2,
                    alphabet: '0,1',
                    transitions: {
                        'q0': { '0': 'q0', '1': 'q1' },
                        'q1': { '0': 'q0', '1': 'q1' }
                    },
                    startState: 'q0',
                    acceptStates: ['q1']
                },
                'Even number of 0s': {
                    numStates: 2,
                    alphabet: '0,1',
                    transitions: {
                        'q0': { '0': 'q1', '1': 'q0' },
                        'q1': { '0': 'q0', '1': 'q1' }
                    },
                    startState: 'q0',
                    acceptStates: ['q0']
                },
                'Divisible by 3 (binary)': {
                    numStates: 3,
                    alphabet: '0,1',
                    transitions: {
                        'q0': { '0': 'q0', '1': 'q1' },
                        'q1': { '0': 'q2', '1': 'q0' },
                        'q2': { '0': 'q1', '1': 'q2' }
                    },
                    startState: 'q0',
                    acceptStates: ['q0']
                },
                'Contains substring 101': {
                    numStates: 4,
                    alphabet: '0,1',
                    transitions: {
                        'q0': { '0': 'q0', '1': 'q1' },
                        'q1': { '0': 'q2', '1': 'q1' },
                        'q2': { '0': 'q0', '1': 'q3' },
                        'q3': { '0': 'q3', '1': 'q3' }
                    },
                    startState: 'q0',
                    acceptStates: ['q3']
                }
            };

            // Initialize state positions when DFA is built
            const calculateStatePositions = useCallback(() => {
                const positions = {};
                const states = Array.from({ length: numStates }, (_, i) => `q${i}`);
                const centerX = 400;
                const centerY = 250;
                const radius = 150;
                
                states.forEach((state, index) => {
                    const angle = (2 * Math.PI * index) / states.length - Math.PI / 2;
                    positions[state] = {
                        x: centerX + radius * Math.cos(angle),
                        y: centerY + radius * Math.sin(angle)
                    };
                });
                
                setStatePositions(positions);
            }, [numStates]);

            // Build DFA from inputs
            const buildDFA = () => {
                const symbols = alphabet.split(',').map(s => s.trim()).filter(s => s);
                const newTransitions = {};
                
                for (let i = 0; i < numStates; i++) {
                    const state = `q${i}`;
                    newTransitions[state] = {};
                    symbols.forEach(symbol => {
                        newTransitions[state][symbol] = `q0`;
                    });
                }
                
                setTransitions(newTransitions);
                calculateStatePositions();
                setResult(null);
                setPathTrace([]);
                setCurrentState(null);
            };

            // Update transition table
            const updateTransition = (fromState, symbol, toState) => {
                setTransitions(prev => ({
                    ...prev,
                    [fromState]: {
                        ...prev[fromState],
                        [symbol]: toState
                    }
                }));
            };

            // Load example
            const loadExample = (exampleName) => {
                const example = examples[exampleName];
                if (example) {
                    setNumStates(example.numStates);
                    setAlphabet(example.alphabet);
                    setTransitions(example.transitions);
                    setStartState(example.startState);
                    setAcceptStates(example.acceptStates);
                    setCurrentState(null);
                    setResult(null);
                    setPathTrace([]);
                    setTimeout(() => calculateStatePositions(), 100);
                }
            };

            // Run DFA animation
            const runAnimation = () => {
                if (!inputString || isAnimating) return;
                
                setIsAnimating(true);
                setCurrentStep(0);
                setCurrentState(startState);
                setPathTrace([startState]);
                setResult(null);
                setIsPaused(false);
                
                animateDFA(startState, inputString, 0);
            };

            // Animate DFA step by step
            const animateDFA = (state, remainingString, step) => {
                if (step >= remainingString.length) {
                    // Animation complete
                    const isAccepted = acceptStates.includes(state);
                    setResult({
                        accepted: isAccepted,
                        message: isAccepted ? 'String ACCEPTED' : 'String REJECTED - Ended in non-accept state',
                        finalState: state
                    });
                    setIsAnimating(false);
                    setCurrentState(null);
                    return;
                }
                
                const symbol = remainingString[step];
                const nextState = transitions[state]?.[symbol];
                
                if (!nextState) {
                    setResult({
                        accepted: false,
                        message: `String REJECTED - No transition from ${state} on '${symbol}'`,
                        finalState: state
                    });
                    setIsAnimating(false);
                    setCurrentState(null);
                    return;
                }
                
                setCurrentState(state);
                setActiveTransition({ from: state, to: nextState, symbol });
                setCurrentStep(step + 1);
                
                const timeout = setTimeout(() => {
                    setPathTrace(prev => [...prev, nextState]);
                    setActiveTransition(null);
                    animateDFA(nextState, remainingString, step + 1);
                }, animationSpeed);
                
                animationTimeoutRef.current = timeout;
            };

            const pauseAnimation = () => {
                setIsPaused(!isPaused);
                if (animationTimeoutRef.current) {
                    clearTimeout(animationTimeoutRef.current);
                }
            };

            const stopAnimation = () => {
                if (animationTimeoutRef.current) {
                    clearTimeout(animationTimeoutRef.current);
                }
                setIsAnimating(false);
                setIsPaused(false);
                setCurrentState(null);
                setActiveTransition(null);
                setCurrentStep(0);
            };

            const resetAnimation = () => {
                stopAnimation();
                setResult(null);
                setPathTrace([]);
                setInputString('');
            };

            // Generate random string
            const generateRandomString = () => {
                const symbols = alphabet.split(',').map(s => s.trim()).filter(s => s);
                const length = Math.floor(Math.random() * 8) + 3;
                let string = '';
                for (let i = 0; i < length; i++) {
                    string += symbols[Math.floor(Math.random() * symbols.length)];
                }
                setInputString(string);
            };

            // Initialize on mount
            useEffect(() => {
                buildDFA();
            }, []);

            // Cleanup timeout on unmount
            useEffect(() => {
                return () => {
                    if (animationTimeoutRef.current) {
                        clearTimeout(animationTimeoutRef.current);
                    }
                };
            }, []);

            // SVG rendering functions
            const renderState = (state) => {
                const pos = statePositions[state];
                if (!pos) return null;
                
                const isStart = state === startState;
                const isAccept = acceptStates.includes(state);
                const isActive = currentState === state;
                const isInPath = pathTrace.includes(state);
                
                return React.createElement('g', { key: state },
                    isStart && React.createElement('path', {
                        d: `M ${pos.x - 60} ${pos.y} L ${pos.x - 35} ${pos.y}`,
                        stroke: '#60a5fa',
                        strokeWidth: '2',
                        fill: 'none',
                        markerEnd: 'url(#arrowhead)'
                    }),
                    React.createElement('circle', {
                        cx: pos.x,
                        cy: pos.y,
                        r: '30',
                        fill: isActive ? '#3b82f6' : isInPath ? '#1f2937' : '#111827',
                        stroke: isAccept ? '#10b981' : isActive ? '#60a5fa' : '#4b5563',
                        strokeWidth: isAccept ? '3' : '2',
                        className: isActive ? 'animate-pulse' : ''
                    }),
                    isAccept && React.createElement('circle', {
                        cx: pos.x,
                        cy: pos.y,
                        r: '25',
                        fill: 'none',
                        stroke: '#10b981',
                        strokeWidth: '2'
                    }),
                    React.createElement('text', {
                        x: pos.x,
                        y: pos.y + 5,
                        textAnchor: 'middle',
                        fill: 'white',
                        fontSize: '14',
                        fontWeight: 'bold'
                    }, state)
                );
            };

            const renderTransition = (fromState, symbol) => {
                const toState = transitions[fromState]?.[symbol];
                if (!toState || !statePositions[fromState] || !statePositions[toState]) return null;
                
                const from = statePositions[fromState];
                const to = statePositions[toState];
                
                if (fromState === toState) {
                    // Self-loop
                    return React.createElement('g', { key: `${fromState}-${symbol}` },
                        React.createElement('path', {
                            d: `M ${from.x + 20} ${from.y} Q ${from.x + 50} ${from.y - 40} ${from.x} ${from.y - 20}`,
                            stroke: activeTransition?.from === fromState && activeTransition?.symbol === symbol ? '#fbbf24' : '#9ca3af',
                            strokeWidth: '2',
                            fill: 'none',
                            markerEnd: 'url(#arrowhead)'
                        }),
                        React.createElement('text', {
                            x: from.x + 35,
                            y: from.y - 25,
                            fill: 'white',
                            fontSize: '12'
                        }, symbol)
                    );
                }
                
                // Calculate arrow position
                const dx = to.x - from.x;
                const dy = to.y - from.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const unitX = dx / distance;
                const unitY = dy / distance;
                
                const startX = from.x + unitX * 35;
                const startY = from.y + unitY * 35;
                const endX = to.x - unitX * 35;
                const endY = to.y - unitY * 35;
                
                // Check for multiple transitions between same states
                const symbols = Object.keys(transitions[fromState]).filter(s => transitions[fromState][s] === toState);
                const index = symbols.indexOf(symbol);
                const offset = (index - (symbols.length - 1) / 2) * 15;
                
                const perpX = -unitY * offset;
                const perpY = unitX * offset;
                
                return React.createElement('g', { key: `${fromState}-${symbol}` },
                    React.createElement('path', {
                        d: `M ${startX + perpX} ${startY + perpY} L ${endX + perpX} ${endY + perpY}`,
                        stroke: activeTransition?.from === fromState && activeTransition?.symbol === symbol ? '#fbbf24' : '#9ca3af',
                        strokeWidth: '2',
                        fill: 'none',
                        markerEnd: 'url(#arrowhead)'
                    }),
                    React.createElement('text', {
                        x: (startX + endX) / 2 + perpX,
                        y: (startY + endY) / 2 + perpY - 5,
                        fill: 'white',
                        fontSize: '12'
                    }, symbol)
                );
            };

            const symbols = alphabet.split(',').map(s => s.trim()).filter(s => s);
            const states = Array.from({ length: numStates }, (_, i) => `q${i}`);

            return React.createElement('div', { className: 'min-h-screen bg-gray-900 text-white p-4' },
                React.createElement('div', { className: 'max-w-7xl mx-auto' },
                    React.createElement('h1', { className: 'text-3xl font-bold text-center mb-6 text-blue-400' }, 'DFA Simulator & Animator'),
                    
                    React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-6' },
                        // Left Panel - DFA Builder
                        React.createElement('div', { className: 'bg-gray-800 rounded-lg p-6 space-y-4' },
                            React.createElement('h2', { className: 'text-xl font-semibold text-blue-300' }, 'DFA Builder'),
                            
                            // Examples
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-sm font-medium mb-2' }, 'Load Example'),
                                React.createElement('select', {
                                    onChange: (e) => e.target.value && loadExample(e.target.value),
                                    className: 'w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500'
                                },
                                    React.createElement('option', { value: '' }, 'Select an example...'),
                                    Object.keys(examples).map(name => 
                                        React.createElement('option', { key: name, value: name }, name)
                                    )
                                )
                            ),
                            
                            // Number of States
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-sm font-medium mb-2' }, 'Number of States'),
                                React.createElement('input', {
                                    type: 'number',
                                    min: '1',
                                    max: '10',
                                    value: numStates,
                                    onChange: (e) => setNumStates(parseInt(e.target.value) || 1),
                                    className: 'w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500'
                                })
                            ),
                            
                            // Alphabet
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-sm font-medium mb-2' }, 'Alphabet (comma-separated)'),
                                React.createElement('input', {
                                    type: 'text',
                                    value: alphabet,
                                    onChange: (e) => setAlphabet(e.target.value),
                                    placeholder: '0,1',
                                    className: 'w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500'
                                })
                            ),
                            
                            // Start State
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-sm font-medium mb-2' }, 'Start State'),
                                React.createElement('select', {
                                    value: startState,
                                    onChange: (e) => setStartState(e.target.value),
                                    className: 'w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500'
                                },
                                    states.map(state => 
                                        React.createElement('option', { key: state, value: state }, state)
                                    )
                                )
                            ),
                            
                            // Accept States
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-sm font-medium mb-2' }, 'Accept States'),
                                React.createElement('div', { className: 'space-y-2 max-h-32 overflow-y-auto' },
                                    states.map(state => 
                                        React.createElement('label', { key: state, className: 'flex items-center' },
                                            React.createElement('input', {
                                                type: 'checkbox',
                                                checked: acceptStates.includes(state),
                                                onChange: (e) => {
                                                    if (e.target.checked) {
                                                        setAcceptStates([...acceptStates, state]);
                                                    } else {
                                                        setAcceptStates(acceptStates.filter(s => s !== state));
                                                    }
                                                },
                                                className: 'mr-2'
                                            }),
                                            state
                                        )
                                    )
                                )
                            ),
                            
                            // Build Button
                            React.createElement('button', {
                                onClick: buildDFA,
                                className: 'w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-md font-medium transition-colors'
                            }, 'Build DFA')
                        ),
                        
                        // Right/Center Panel - SVG Canvas
                        React.createElement('div', { className: 'lg:col-span-2 bg-gray-800 rounded-lg p-6' },
                            React.createElement('h2', { className: 'text-xl font-semibold text-blue-300 mb-4' }, 'DFA Visualization'),
                            
                            React.createElement('div', { className: 'bg-gray-900 rounded-lg p-4' },
                                React.createElement('svg', {
                                    ref: svgRef,
                                    width: '800',
                                    height: '500',
                                    viewBox: '0 0 800 500',
                                    className: 'w-full h-auto'
                                },
                                    React.createElement('defs', null,
                                        React.createElement('marker', {
                                            id: 'arrowhead',
                                            markerWidth: '10',
                                            markerHeight: '10',
                                            refX: '9',
                                            refY: '3',
                                            orient: 'auto'
                                        },
                                            React.createElement('polygon', {
                                                points: '0 0, 10 3, 0 6',
                                                fill: '#9ca3af'
                                            })
                                        )
                                    ),
                                    
                                    // Render transitions
                                    states.map(state => 
                                        symbols.map(symbol => renderTransition(state, symbol))
                                    ),
                                    
                                    // Render states
                                    states.map(state => renderState(state))
                                )
                            ),
                            
                            // Animation Controls
                            React.createElement('div', { className: 'mt-6 space-y-4' },
                                React.createElement('div', { className: 'flex items-center space-x-4' },
                                    React.createElement('input', {
                                        type: 'text',
                                        value: inputString,
                                        onChange: (e) => setInputString(e.target.value),
                                        placeholder: 'Enter input string...',
                                        className: 'flex-1 px-3 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500',
                                        disabled: isAnimating
                                    }),
                                    React.createElement('button', {
                                        onClick: generateRandomString,
                                        className: 'px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-md text-sm transition-colors',
                                        disabled: isAnimating
                                    }, 'Random')
                                ),
                                
                                React.createElement('div', { className: 'flex items-center space-x-2' },
                                    React.createElement('button', {
                                        onClick: runAnimation,
                                        disabled: !inputString || isAnimating,
                                        className: 'px-4 py-2 bg-green-600 hover:bg-green-700 disabled:bg-gray-600 disabled:cursor-not-allowed rounded-md transition-colors'
                                    }, 'Run'),
                                    React.createElement('button', {
                                        onClick: pauseAnimation,
                                        disabled: !isAnimating,
                                        className: 'px-4 py-2 bg-yellow-600 hover:bg-yellow-700 disabled:bg-gray-600 disabled:cursor-not-allowed rounded-md transition-colors'
                                    }, isPaused ? 'Resume' : 'Pause'),
                                    React.createElement('button', {
                                        onClick: stopAnimation,
                                        disabled: !isAnimating,
                                        className: 'px-4 py-2 bg-red-600 hover:bg-red-700 disabled:bg-gray-600 disabled:cursor-not-allowed rounded-md transition-colors'
                                    }, 'Stop'),
                                    React.createElement('button', {
                                        onClick: resetAnimation,
                                        className: 'px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-md transition-colors'
                                    }, 'Reset')
                                ),
                                
                                // Current Step Display
                                isAnimating && React.createElement('div', { className: 'bg-gray-700 rounded-lg p-3' },
                                    React.createElement('div', { className: 'text-sm' },
                                        React.createElement('span', { className: 'font-medium' }, `Step ${currentStep}/${inputString.length}: `),
                                        currentStep < inputString.length && React.createElement('span', { className: 'ml-2' },
                                            'Reading \'',
                                            React.createElement('span', { className: 'text-yellow-400 font-bold' }, inputString[currentStep]),
                                            '\''
                                        )
                                    )
                                ),
                                
                                // Result Display
                                result && React.createElement('div', {
                                    className: `rounded-lg p-4 ${
                                        result.accepted ? 'bg-green-900 border-2 border-green-600' : 'bg-red-900 border-2 border-red-600'
                                    }`
                                },
                                    React.createElement('div', { className: 'flex items-center space-x-2' },
                                        React.createElement('span', { className: 'text-2xl' }, result.accepted ? '✅' : '❌'),
                                        React.createElement('span', { className: 'font-bold text-lg' }, result.message)
                                    )
                                )
                            )
                        )
                    )
                )
            );
        };

        const { createElement } = React;
        const { createRoot } = ReactDOM;
        
        const root = createRoot(document.getElementById('root'));
        root.render(createElement(DFASimulator));
    </script>
</body>
</html>
